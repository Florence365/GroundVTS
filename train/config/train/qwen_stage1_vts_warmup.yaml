# Qwen Stage 1: VTS Warmup (full fine-tuning)
# Paths use placeholders — replace <...> with your actual paths before training.

model_name_or_path: <path/to/base_model>
output_dir: <path/to/output/stage1>
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full

# Freeze Options
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: true

# deepspeed: train/deepspeed/ds_z3_config.json

### multimodal
image_max_pixels: 262144
video_max_pixels: 16384
video_fps: 2.0

### dataset
dataset: 0_30_s_academic_mc_v0_1_qa_processed, 30_60_s_academic_mc_v0_1_qa_processed, 1_2_m_academic_mc_v0_1_qa_processed, 2_3_m_academic_mc_v0_1_qa_processed, 
        0_30_s_academic_oe_v0_1_qa_processed, 30_60_s_academic_oe_v0_1_qa_processed, 1_2_m_academic_oe_v0_1_qa_processed, 2_3_m_academic_oe_v0_1_qa_processed, 
        0_30_s_academic_v0_1_cap_processed, 30_60_s_academic_v0_1_cap_processed, 1_2_m_academic_v0_1_cap_processed, 2_3_m_academic_v0_1_cap_processed
dataset_dir: <path/to/dataset_info>
media_dir: <path/to/media>

template: qwen2_vl
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 72

### output
logging_steps: 5
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none  # can switch to wandb/tensorboard

### train
num_train_epochs: 3
learning_rate: 1e-5
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
