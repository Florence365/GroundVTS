# Qwen Stage 3: Grounding Fine-tuning (LoRA)
# Paths use placeholders — replace <...> with your actual paths before training.

model_name_or_path: <path/to/output/stage1>
adapter_name_or_path: <path/to/adapter>
output_dir: <path/to/output/stage3>

trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora

# LoRA config
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: ["q_proj", "k_proj", "v_proj", "o_proj"]
additional_target: ["merger", "vts_module"]

### multimodal
image_max_pixels: 262144
video_max_pixels: 16384
video_fps: 2.0

### dataset
dataset: FT_charades_sta_train, FT_qvhighlights_train, FT_activitynetcaptions_train

dataset_dir: <path/to/dataset_info>
media_dir: <path/to/media>

template: qwen2_vl
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 72

### output
logging_steps: 5
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
num_train_epochs: 3
learning_rate: 1e-4
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
